openapi: 3.0.3
info:
  title: Ticket Cabinet API
  version: 1.0.0
  description: |
    Контракт API для клиентского приложения и API Gateway.
servers:
  - url: http://localhost:4000
    description: Local API Gateway
tags:
  - name: Health
  - name: Auth
  - name: Events
  - name: Bookings
paths:
  /health:
    get:
      tags: [Health]
      summary: Проверка состояния gateway
      responses:
        "200":
          description: Сервис работает
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Регистрация пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterDto"
      responses:
        "201":
          description: Пользователь создан и авторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Невалидные данные
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Пользователь уже существует
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Логин пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginDto"
      responses:
        "200":
          description: Успешная авторизация
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Невалидные данные
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Неверный email или пароль
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/auth/me:
    get:
      tags: [Auth]
      summary: Получение профиля текущего пользователя
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Данные пользователя
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Неавторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/events:
    get:
      tags: [Events]
      summary: Список мероприятий
      responses:
        "200":
          description: Список мероприятий
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EventItem"
        "500":
          description: Ошибка загрузки мероприятий
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      tags: [Events]
      summary: Создание мероприятия (только admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventDto"
      responses:
        "201":
          description: Мероприятие создано
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventItem"
        "400":
          description: Невалидные данные
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Неавторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Недостаточно прав
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/bookings:
    get:
      tags: [Bookings]
      summary: Список бронирований текущего пользователя
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Список бронирований
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
        "401":
          description: Неавторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Ошибка сервиса бронирований
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      tags: [Bookings]
      summary: Создание бронирования
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingDto"
      responses:
        "201":
          description: Бронирование создано
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          description: Невалидные данные
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Неавторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Мероприятие не найдено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Недостаточно мест
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: Сервис мероприятий недоступен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthResponse:
      type: object
      required: [status, service]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: api-gateway
    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: Некорректный или просроченный токен
    User:
      type: object
      required: [id, email, name, role, createdAt]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [user, admin]
        createdAt:
          type: string
          format: date-time
    RegisterDto:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
        name:
          type: string
        role:
          type: string
          enum: [user, admin]
    LoginDto:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
    EventItem:
      type: object
      required: [id, title, description, startsAt, venue, capacity, availableSeats, createdBy]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        startsAt:
          type: string
          format: date-time
        venue:
          type: string
        capacity:
          type: integer
          minimum: 1
        availableSeats:
          type: integer
          minimum: 0
        createdBy:
          type: string
          format: uuid
    CreateEventDto:
      type: object
      required: [title, startsAt, venue, capacity]
      properties:
        title:
          type: string
        description:
          type: string
          default: ""
        startsAt:
          type: string
          format: date-time
        venue:
          type: string
        capacity:
          type: integer
          minimum: 1
    Booking:
      type: object
      required: [id, userId, eventId, quantity, createdAt]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        eventId:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
        createdAt:
          type: string
          format: date-time
    CreateBookingDto:
      type: object
      required: [eventId, quantity]
      properties:
        eventId:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
